<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - రోహిణి కథలు</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-body login-page">

<div class="login-card">
  <h1>Admin Login</h1>
  <p>రోహిణి కథలు · Story Management</p>

  <div class="error-msg" id="error-msg"></div>

  <form id="login-form">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" placeholder="admin">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="login-btn">
      Sign In
    </button>
  </form>

  <p style="margin-top:1.5rem;text-align:center;font-size:0.8rem;">
    <a href="/" style="color:#8B1A1A;">← Back to website</a>
  </p>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('admin_token')) {
    window.location.href = '/admin/dashboard.html';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errorEl = document.getElementById('error-msg');
    errorEl.style.display = 'none';
    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');

      localStorage.setItem('admin_token', data.token);
      window.location.href = '/admin/dashboard.html';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
